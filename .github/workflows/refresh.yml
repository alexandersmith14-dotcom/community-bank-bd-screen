name: Refresh dashboard

# Rebuilds the target list + dashboard from the latest FDIC data and publishes
# it to GitHub Pages. Runs weekly (FDIC data changes quarterly, so most runs are
# no-ops) and on demand from the Actions tab.
on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pandas requests numpy
      - run: python 01_fetch.py       # current-quarter snapshot
      - run: python 02_screen.py      # snapshot signals + all_banks.csv
      - run: python 04_history.py     # 20 quarters of history
      - run: python 05_trajectory.py  # trend features -> enriched targets.csv
      - run: python 06_edgar.py       # SEC EDGAR officers for public banks
      - run: python 07_cu_fetch.py    # NCUA credit-union data
      - run: python 08_cu_screen.py   # credit-union RAS targets
      - run: python 09_fintech.py     # fintech (FinCEN MSB) RAS targets
      - run: python 03_dashboard.py   # dashboard (banks + credit unions + fintechs)
      - run: cp output/dashboard.html docs/index.html
      - name: Commit if the dashboard changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Auto-refresh dashboard from latest FDIC data"
          git push
